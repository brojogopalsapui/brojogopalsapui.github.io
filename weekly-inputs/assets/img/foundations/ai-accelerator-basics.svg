<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-label="AI Accelerator Basics">
<defs>
<linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fbfdff"/><stop offset="100%" stop-color="#eef4ff"/></linearGradient>
<linearGradient id="multi" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2563eb"/><stop offset="50%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.18"/></filter>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
<marker id="arrowSlate" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/></marker>
<style>
.title{font:800 34px Inter,Arial,sans-serif;fill:#22304a}
.subtitle{font:700 16px Inter,Arial,sans-serif;fill:#4a5d78;letter-spacing:.05em;text-transform:uppercase}
.bt{font:800 19px Inter,Arial,sans-serif;fill:#22304a}
.bs{font:500 15px Inter,Arial,sans-serif;fill:#4a5d78}
.cap{font:700 14px Inter,Arial,sans-serif;fill:#4a5d78}
</style></defs>
<rect width="1400" height="760" rx="28" fill="url(#bgGrad)"/>
<rect x="28" y="26" width="1344" height="708" rx="24" fill="none" stroke="#d7e2f1"/>
<text x="70" y="72" class="subtitle">AI Foundations</text>
<text x="70" y="118" class="title">AI Accelerator Basics</text>
<g filter="url(#shadow)"><rect x="75" y="165" width="190" height="92" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="75" y="165" width="190" height="7" rx="22" fill="#2563eb"/></g>
<text x="95" y="205" class="bt">Input DMA</text>
<text x="95" y="237" class="bs">host tensors enter</text><g filter="url(#shadow)"><rect x="305" y="165" width="210" height="92" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="305" y="165" width="210" height="7" rx="22" fill="#7c3aed"/></g>
<text x="325" y="205" class="bt">On-chip Buffers</text>
<text x="325" y="237" class="bs">tiles + partial sums</text><g filter="url(#shadow)"><rect x="555" y="150" width="270" height="122" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="555" y="150" width="270" height="7" rx="22" fill="#0f766e"/></g>
<text x="575" y="190" class="bt">Tensor / MAC Array</text>
<text x="575" y="222" class="bs">systolic, tensor-core,</text>
<text x="575" y="249" class="bs">or SIMD compute</text><g filter="url(#shadow)"><rect x="865" y="165" width="200" height="92" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="865" y="165" width="200" height="7" rx="22" fill="#d97706"/></g>
<text x="885" y="205" class="bt">Vector / SFU</text>
<text x="885" y="237" class="bs">activation / norm</text><g filter="url(#shadow)"><rect x="1105" y="165" width="180" height="92" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="1105" y="165" width="180" height="7" rx="22" fill="#64748b"/></g>
<text x="1125" y="205" class="bt">Write-back</text>
<text x="1125" y="237" class="bs">results to SRAM/HBM</text><line x1="265" y1="210" x2="305" y2="210" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/><line x1="515" y1="210" x2="555" y2="210" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/><line x1="825" y1="210" x2="865" y2="210" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/><line x1="1065" y1="210" x2="1105" y2="210" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/><g filter="url(#shadow)"><rect x="90" y="365" width="1210" height="250" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="90" y="365" width="1210" height="7" rx="22" fill="url(#multi)"/></g>
<text x="110" y="405" class="bt">Execution concepts</text>
<text x="110" y="437" class="bs">How models become hardware behavior</text><g filter="url(#shadow)"><rect x="120" y="430" width="250" height="110" rx="22" fill="#eef5ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="120" y="430" width="250" height="7" rx="22" fill="#2563eb"/></g>
<text x="140" y="470" class="bt">Dataflow</text>
<text x="140" y="502" class="bs">weight stationary</text>
<text x="140" y="529" class="bs">output stationary</text><g filter="url(#shadow)"><rect x="410" y="430" width="250" height="110" rx="22" fill="#eef5ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="410" y="430" width="250" height="7" rx="22" fill="#7c3aed"/></g>
<text x="430" y="470" class="bt">Tiling</text>
<text x="430" y="502" class="bs">fit tiles to buffers</text>
<text x="430" y="529" class="bs">hide latency</text><g filter="url(#shadow)"><rect x="700" y="430" width="250" height="110" rx="22" fill="#eef5ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="700" y="430" width="250" height="7" rx="22" fill="#0f766e"/></g>
<text x="720" y="470" class="bt">Precision</text>
<text x="720" y="502" class="bs">INT8 / FP16 / BF16</text>
<text x="720" y="529" class="bs">energy vs robustness</text><g filter="url(#shadow)"><rect x="990" y="430" width="250" height="110" rx="22" fill="#eef5ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="990" y="430" width="250" height="7" rx="22" fill="#d97706"/></g>
<text x="1010" y="470" class="bt">Kernel mapping</text>
<text x="1010" y="502" class="bs">fusion, sparsity,</text>
<text x="1010" y="529" class="bs">schedule order</text><text x="700" y="595" class="cap" fill="#4a5d78" text-anchor="middle">Different mapping choices can produce distinct timing, memory, power, and fault signatures.</text></svg>
