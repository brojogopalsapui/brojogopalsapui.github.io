<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-label="Memory Hierarchy for AI">
<defs>
<linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fbfdff"/><stop offset="100%" stop-color="#eef4ff"/></linearGradient>
<linearGradient id="multi" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2563eb"/><stop offset="50%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.18"/></filter>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
<marker id="arrowSlate" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/></marker>
<style>
.title{font:800 34px Inter,Arial,sans-serif;fill:#22304a}
.subtitle{font:700 16px Inter,Arial,sans-serif;fill:#4a5d78;letter-spacing:.05em;text-transform:uppercase}
.bt{font:800 19px Inter,Arial,sans-serif;fill:#22304a}
.bs{font:500 15px Inter,Arial,sans-serif;fill:#4a5d78}
.cap{font:700 14px Inter,Arial,sans-serif;fill:#4a5d78}
</style></defs>
<rect width="1400" height="760" rx="28" fill="url(#bgGrad)"/>
<rect x="28" y="26" width="1344" height="708" rx="24" fill="none" stroke="#d7e2f1"/>
<text x="70" y="72" class="subtitle">AI Foundations</text>
<text x="70" y="118" class="title">Memory Hierarchy for AI</text>
<g filter="url(#shadow)"><rect x="530" y="150" width="340" height="78" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="530" y="150" width="340" height="7" rx="22" fill="#2563eb"/></g>
<text x="550" y="190" class="bt">Register File</text>
<text x="550" y="222" class="bs">closest to MACs</text>
<text x="550" y="249" class="bs">smallest + fastest</text><line x1="700" y1="228" x2="700" y2="250" stroke="#64748b" stroke-width="3" marker-end="url(#arrowSlate)"/><g filter="url(#shadow)"><rect x="530" y="250" width="340" height="78" rx="22" fill="#eef5ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="530" y="250" width="340" height="7" rx="22" fill="#7c3aed"/></g>
<text x="550" y="290" class="bt">Local SRAM</text>
<text x="550" y="322" class="bs">tile buffers</text>
<text x="550" y="349" class="bs">high reuse window</text><line x1="700" y1="328" x2="700" y2="350" stroke="#64748b" stroke-width="3" marker-end="url(#arrowSlate)"/><g filter="url(#shadow)"><rect x="530" y="350" width="340" height="78" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="530" y="350" width="340" height="7" rx="22" fill="#0f766e"/></g>
<text x="550" y="390" class="bt">On-chip Cache</text>
<text x="550" y="422" class="bs">shared buffers</text>
<text x="550" y="449" class="bs">fabric-visible</text><line x1="700" y1="428" x2="700" y2="450" stroke="#64748b" stroke-width="3" marker-end="url(#arrowSlate)"/><g filter="url(#shadow)"><rect x="530" y="450" width="340" height="78" rx="22" fill="#eef5ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="530" y="450" width="340" height="7" rx="22" fill="#d97706"/></g>
<text x="550" y="490" class="bt">HBM / DRAM</text>
<text x="550" y="522" class="bs">weights, activations</text>
<text x="550" y="549" class="bs">bandwidth-critical</text><line x1="700" y1="528" x2="700" y2="550" stroke="#64748b" stroke-width="3" marker-end="url(#arrowSlate)"/><g filter="url(#shadow)"><rect x="530" y="550" width="340" height="78" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="530" y="550" width="340" height="7" rx="22" fill="#64748b"/></g>
<text x="550" y="590" class="bt">Host Memory</text>
<text x="550" y="622" class="bs">offload / paging</text>
<text x="550" y="649" class="bs">largest + slowest</text><g filter="url(#shadow)"><rect x="70" y="200" width="360" height="220" rx="22" fill="#edf4ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="70" y="200" width="360" height="7" rx="22" fill="#2563eb"/></g>
<text x="90" y="240" class="bt">What changes security behavior?</text>
<text x="90" y="272" class="bs">Burst pattern</text>
<text x="90" y="299" class="bs">cache residency</text>
<text x="90" y="326" class="bs">spill and paging</text>
<text x="90" y="353" class="bs">bandwidth pressure</text><g filter="url(#shadow)"><rect x="970" y="190" width="360" height="240" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="970" y="190" width="360" height="7" rx="22" fill="#7c3aed"/></g>
<text x="990" y="230" class="bt">Key observation points</text>
<text x="990" y="262" class="bs">on-chip refill cadence</text>
<text x="990" y="289" class="bs">cache/fabric contention</text>
<text x="990" y="316" class="bs">HBM traffic volume</text>
<text x="990" y="343" class="bs">host-memory offload</text><g filter="url(#shadow)"><rect x="250" y="620" width="880" height="86" rx="22" fill="#fff9ef" stroke="#ead7b2" stroke-width="1.5"/><rect x="250" y="620" width="880" height="7" rx="22" fill="#d97706"/></g>
<text x="270" y="660" class="bt">Security lens</text>
<text x="270" y="692" class="bs">A memory-aware threat model asks where tensors live, how often they move, and which moves are externally visible.</text></svg>
