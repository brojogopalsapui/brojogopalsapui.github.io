<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-label="CPU–GPU–NPU Partitioning">
<defs>
<linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fbfdff"/><stop offset="100%" stop-color="#eef4ff"/></linearGradient>
<linearGradient id="multi" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2563eb"/><stop offset="50%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.18"/></filter>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
<marker id="arrowSlate" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/></marker>
<style>
.title{font:800 34px Inter,Arial,sans-serif;fill:#22304a}
.subtitle{font:700 16px Inter,Arial,sans-serif;fill:#4a5d78;letter-spacing:.05em;text-transform:uppercase}
.bt{font:800 19px Inter,Arial,sans-serif;fill:#22304a}
.bs{font:500 15px Inter,Arial,sans-serif;fill:#4a5d78}
.cap{font:700 14px Inter,Arial,sans-serif;fill:#4a5d78}
</style></defs>
<rect width="1400" height="760" rx="28" fill="url(#bgGrad)"/>
<rect x="28" y="26" width="1344" height="708" rx="24" fill="none" stroke="#d7e2f1"/>
<text x="70" y="72" class="subtitle">AI Foundations</text>
<text x="70" y="118" class="title">CPU–GPU–NPU Partitioning</text>
<g filter="url(#shadow)"><rect x="90" y="180" width="280" height="150" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="90" y="180" width="280" height="7" rx="22" fill="#2563eb"/></g>
<text x="110" y="220" class="bt">CPU Domain</text>
<text x="110" y="252" class="bs">orchestration</text>
<text x="110" y="279" class="bs">pre/post-processing</text>
<text x="110" y="306" class="bs">OS + driver control</text><g filter="url(#shadow)"><rect x="560" y="180" width="280" height="150" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="560" y="180" width="280" height="7" rx="22" fill="#7c3aed"/></g>
<text x="580" y="220" class="bt">GPU Domain</text>
<text x="580" y="252" class="bs">parallel kernels</text>
<text x="580" y="279" class="bs">flexible compute</text>
<text x="580" y="306" class="bs">shared resources</text><g filter="url(#shadow)"><rect x="1030" y="180" width="280" height="150" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="1030" y="180" width="280" height="7" rx="22" fill="#0f766e"/></g>
<text x="1050" y="220" class="bt">NPU Domain</text>
<text x="1050" y="252" class="bs">efficient local inference</text>
<text x="1050" y="279" class="bs">vendor runtime path</text>
<text x="1050" y="306" class="bs">operator constraints</text><line x1="370" y1="255" x2="560" y2="255" stroke="#64748b" stroke-width="3" marker-end="url(#arrowSlate)"/><line x1="840" y1="255" x2="1030" y2="255" stroke="#64748b" stroke-width="3" marker-end="url(#arrowSlate)"/><text x="465" y="240" class="cap" fill="#4a5d78" text-anchor="middle">tensors + commands</text><text x="935" y="240" class="cap" fill="#4a5d78" text-anchor="middle">delegation + fallback</text><g filter="url(#shadow)"><rect x="90" y="430" width="500" height="210" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="90" y="430" width="500" height="7" rx="22" fill="url(#multi)"/></g>
<text x="110" y="470" class="bt">Why partitioning matters</text>
<text x="110" y="502" class="bs">workloads cross memory domains</text>
<text x="110" y="529" class="bs">unsupported ops may fall back</text>
<text x="110" y="556" class="bs">trust boundaries move with the tensor</text><g filter="url(#shadow)"><rect x="660" y="430" width="650" height="210" rx="22" fill="#edf4ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="660" y="430" width="650" height="7" rx="22" fill="#d97706"/></g>
