<text x="720" y="540" class="bt">Shared memory</text>
<text x="720" y="572" class="bs">copy / map</text>
<text x="720" y="599" class="bs">zeroize</text><g filter="url(#shadow)"><rect x="900" y="500" width="170" height="92" rx="22" fill="#eef5ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="900" y="500" width="170" height="7" rx="22" fill="#7c3aed"/></g>
<text x="920" y="540" class="bt">Driver stack</text>
<text x="920" y="572" class="bs">permissions</text>
<text x="920" y="599" class="bs">telemetry</text><g filter="url(#shadow)"><rect x="1100" y="500" width="170" height="92" rx="22" fill="#eef5ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="1100" y="500" width="170" height="7" rx="22" fill="#0f766e"/></g>
<text x="1120" y="540" class="bt">Runtime</text>
<text x="1120" y="572" class="bs">partition plan</text>
<text x="1120" y="599" class="bs">fallback path</text></svg>
