<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-label="LLM Inference Systems">
<defs>
<linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fbfdff"/><stop offset="100%" stop-color="#eef4ff"/></linearGradient>
<linearGradient id="multi" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2563eb"/><stop offset="50%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.18"/></filter>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
<marker id="arrowSlate" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/></marker>
<style>
.title{font:800 34px Inter,Arial,sans-serif;fill:#22304a}
.subtitle{font:700 16px Inter,Arial,sans-serif;fill:#4a5d78;letter-spacing:.05em;text-transform:uppercase}
.bt{font:800 19px Inter,Arial,sans-serif;fill:#22304a}
.bs{font:500 15px Inter,Arial,sans-serif;fill:#4a5d78}
.cap{font:700 14px Inter,Arial,sans-serif;fill:#4a5d78}
</style></defs>
<rect width="1400" height="760" rx="28" fill="url(#bgGrad)"/>
<rect x="28" y="26" width="1344" height="708" rx="24" fill="none" stroke="#d7e2f1"/>
<text x="70" y="72" class="subtitle">AI Foundations</text>
<text x="70" y="118" class="title">LLM Inference Systems</text>
<g filter="url(#shadow)"><rect x="70" y="170" width="235" height="110" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="70" y="170" width="235" height="7" rx="22" fill="#2563eb"/></g>
<text x="90" y="210" class="bt">Tokenization</text>
<text x="90" y="242" class="bs">prompt to tokens</text><line x1="305" y1="225" x2="340" y2="225" stroke="#64748b" stroke-width="3" marker-end="url(#arrowSlate)"/><g filter="url(#shadow)"><rect x="340" y="170" width="235" height="110" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="340" y="170" width="235" height="7" rx="22" fill="#7c3aed"/></g>
<text x="360" y="210" class="bt">Prefill</text>
<text x="360" y="242" class="bs">parallel attention</text><line x1="575" y1="225" x2="610" y2="225" stroke="#64748b" stroke-width="3" marker-end="url(#arrowSlate)"/><g filter="url(#shadow)"><rect x="610" y="170" width="235" height="110" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="610" y="170" width="235" height="7" rx="22" fill="#0f766e"/></g>
<text x="630" y="210" class="bt">KV-cache</text>
<text x="630" y="242" class="bs">store keys + values</text><line x1="845" y1="225" x2="880" y2="225" stroke="#64748b" stroke-width="3" marker-end="url(#arrowSlate)"/><g filter="url(#shadow)"><rect x="880" y="170" width="235" height="110" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="880" y="170" width="235" height="7" rx="22" fill="#d97706"/></g>
<text x="900" y="210" class="bt">Decode Loop</text>
<text x="900" y="242" class="bs">incremental generation</text><line x1="1115" y1="225" x2="1150" y2="225" stroke="#64748b" stroke-width="3" marker-end="url(#arrowSlate)"/><g filter="url(#shadow)"><rect x="1150" y="170" width="235" height="110" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="1150" y="170" width="235" height="7" rx="22" fill="#64748b"/></g>
<text x="1170" y="210" class="bt">Serving Layer</text>
<text x="1170" y="242" class="bs">batching + routing</text><g filter="url(#shadow)"><rect x="90" y="390" width="340" height="200" rx="22" fill="#edf4ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="90" y="390" width="340" height="7" rx="22" fill="#2563eb"/></g>
<text x="110" y="430" class="bt">System phases</text>
<text x="110" y="462" class="bs">prefill is compute-heavy</text>
<text x="110" y="489" class="bs">decode is latency-sensitive</text>
<text x="110" y="516" class="bs">cache grows token by token</text><g filter="url(#shadow)"><rect x="500" y="390" width="810" height="200" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="500" y="390" width="810" height="7" rx="22" fill="#7c3aed"/></g>
<text x="520" y="430" class="bt">Security observation points</text>
<text x="520" y="462" class="bs">prompt length + retrieval size</text>
<text x="520" y="489" class="bs">KV-cache residency / paging</text>
<text x="520" y="516" class="bs">batch merge + scheduler policy</text><g filter="url(#shadow)"><rect x="560" y="465" width="200" height="92" rx="22" fill="#eef5ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="560" y="465" width="200" height="7" rx="22" fill="#2563eb"/></g>
<text x="580" y="505" class="bt">Context window</text>
<text x="580" y="537" class="bs">private context</text>
<text x="580" y="564" class="bs">retrieval payload</text><g filter="url(#shadow)"><rect x="805" y="465" width="220" height="92" rx="22" fill="#eef5ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="805" y="465" width="220" height="7" rx="22" fill="#0f766e"/></g>
<text x="825" y="505" class="bt">KV-cache pressure</text>
<text x="825" y="537" class="bs">memory residency</text>
<text x="825" y="564" class="bs">eviction / paging</text><g filter="url(#shadow)"><rect x="1070" y="465" width="190" height="92" rx="22" fill="#eef5ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="1070" y="465" width="190" height="7" rx="22" fill="#d97706"/></g>
<text x="1090" y="505" class="bt">Scheduler</text>
<text x="1090" y="537" class="bs">priority + timing</text><g filter="url(#shadow)"><rect x="600" y="625" width="620" height="82" rx="22" fill="#fff9ef" stroke="#ead7b2" stroke-width="1.5"/><rect x="600" y="625" width="620" height="7" rx="22" fill="#d97706"/></g>
<text x="620" y="665" class="bt">Key idea</text>
<text x="620" y="697" class="bs">Prefill, decode, cache management, and serving isolation jointly define the LLM system threat model.</text></svg>
