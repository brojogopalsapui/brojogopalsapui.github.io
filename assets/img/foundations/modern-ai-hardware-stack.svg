<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-label="Modern AI Hardware Stack">
<defs>
<linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fbfdff"/><stop offset="100%" stop-color="#eef4ff"/></linearGradient>
<linearGradient id="multi" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2563eb"/><stop offset="50%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.18"/></filter>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
<marker id="arrowSlate" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/></marker>
<style>
.title{font:800 34px Inter,Arial,sans-serif;fill:#22304a}
.subtitle{font:700 16px Inter,Arial,sans-serif;fill:#4a5d78;letter-spacing:.05em;text-transform:uppercase}
.bt{font:800 19px Inter,Arial,sans-serif;fill:#22304a}
.bs{font:500 15px Inter,Arial,sans-serif;fill:#4a5d78}
.cap{font:700 14px Inter,Arial,sans-serif;fill:#4a5d78}
</style></defs>
<rect width="1400" height="760" rx="28" fill="url(#bgGrad)"/>
<rect x="28" y="26" width="1344" height="708" rx="24" fill="none" stroke="#d7e2f1"/>
<text x="70" y="72" class="subtitle">AI Foundations</text>
<text x="70" y="118" class="title">Modern AI Hardware Stack</text>
<g filter="url(#shadow)"><rect x="70" y="160" width="250" height="110" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="70" y="160" width="250" height="7" rx="22" fill="#2563eb"/></g>
<text x="90" y="200" class="bt">Host &amp; Runtime</text>
<text x="90" y="232" class="bs">CPU orchestration</text>
<text x="90" y="259" class="bs">compiler, drivers, DMA</text><g filter="url(#shadow)"><rect x="380" y="160" width="250" height="110" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="380" y="160" width="250" height="7" rx="22" fill="#7c3aed"/></g>
<text x="400" y="200" class="bt">Device Memory</text>
<text x="400" y="232" class="bs">HBM / GDDR / SRAM</text>
<text x="400" y="259" class="bs">weights, activations, cache</text><g filter="url(#shadow)"><rect x="690" y="160" width="250" height="110" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="690" y="160" width="250" height="7" rx="22" fill="#0f766e"/></g>
<text x="710" y="200" class="bt">Tensor Compute</text>
<text x="710" y="232" class="bs">matrix engines</text>
<text x="710" y="259" class="bs">vector + reduction units</text><g filter="url(#shadow)"><rect x="1000" y="160" width="290" height="110" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="1000" y="160" width="290" height="7" rx="22" fill="#d97706"/></g>
<text x="1020" y="200" class="bt">Security Surfaces</text>
<text x="1020" y="232" class="bs">firmware, MMIO, timing</text>
<text x="1020" y="259" class="bs">power / memory / fault paths</text><line x1="320" y1="215" x2="380" y2="215" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/><line x1="630" y1="215" x2="690" y2="215" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/><line x1="940" y1="215" x2="1000" y2="215" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/><g filter="url(#shadow)"><rect x="85" y="360" width="390" height="260" rx="22" fill="#edf4ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="85" y="360" width="390" height="7" rx="22" fill="url(#multi)"/></g>
<text x="105" y="400" class="bt">What this stack explains</text>
<text x="105" y="432" class="bs">Where model state lives</text>
<text x="105" y="459" class="bs">Who launches and controls kernels</text>
<text x="105" y="486" class="bs">Which artifacts become measurable</text>
<text x="105" y="513" class="bs">Where faults or isolation gaps appear</text><g filter="url(#shadow)"><rect x="520" y="360" width="790" height="260" rx="22" fill="#ffffff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="520" y="360" width="790" height="7" rx="22" fill="#d97706"/></g>
<text x="540" y="400" class="bt">Representative questions</text>
<text x="540" y="432" class="bs">Can memory traffic reveal workload phase?</text>
<text x="540" y="459" class="bs">Do firmware and runtime boundaries leak control?</text>
<text x="540" y="486" class="bs">Which compute blocks are stable fault targets?</text>
<text x="540" y="513" class="bs">How much of the system sits outside the model abstraction?</text><g filter="url(#shadow)"><rect x="560" y="445" width="215" height="98" rx="22" fill="#eef5ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="560" y="445" width="215" height="7" rx="22" fill="#2563eb"/></g>
<text x="580" y="485" class="bt">Leakage</text>
<text x="580" y="517" class="bs">timing</text>
<text x="580" y="544" class="bs">memory bursts</text><g filter="url(#shadow)"><rect x="808" y="445" width="215" height="98" rx="22" fill="#eef5ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="808" y="445" width="215" height="7" rx="22" fill="#7c3aed"/></g>
<text x="828" y="485" class="bt">Fault targets</text>
<text x="828" y="517" class="bs">DMA / SRAM / datapath</text><g filter="url(#shadow)"><rect x="1056" y="445" width="215" height="98" rx="22" fill="#eef5ff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="1056" y="445" width="215" height="7" rx="22" fill="#0f766e"/></g>
<text x="1076" y="485" class="bt">Trust zones</text>
<text x="1076" y="517" class="bs">host vs device</text>
<text x="1076" y="544" class="bs">tenant vs firmware</text><g filter="url(#shadow)"><rect x="540" y="650" width="340" height="64" rx="22" fill="#f8fbff" stroke="#c7d7ee" stroke-width="1.5"/><rect x="540" y="650" width="340" height="7" rx="22" fill="#2563eb"/></g>
<text x="560" y="690" class="bt">Execution view</text>
<text x="560" y="722" class="bs">model graph → runtime → memory → silicon</text><g filter="url(#shadow)"><rect x="920" y="650" width="350" height="64" rx="22" fill="#fff9ef" stroke="#c7d7ee" stroke-width="1.5"/><rect x="920" y="650" width="350" height="7" rx="22" fill="#d97706"/></g>
<text x="940" y="690" class="bt">Security view</text>
<text x="940" y="722" class="bs">observation + control exist across the whole stack</text></svg>
